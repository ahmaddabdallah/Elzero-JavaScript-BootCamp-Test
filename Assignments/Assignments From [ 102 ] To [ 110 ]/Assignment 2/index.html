<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOM #1 - Assignment 2</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #ffeeff73;
      }

      .popup-one {
        width: 230px;
        height: 115px;
        background-color: #333;
        border: 2px solid #ff00004f;
        color: white;
        text-align: center;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        position: relative;
      }

      .popup-one button {
        position: absolute;
        top: -10px;
        right: -10px;
        width: 25px;
        height: 25px;
        border-radius: 50%;
        border: 2px solid #ff000064;
        background-color: #925a5adb;
        color: white;
        font-weight: bold;
        cursor: pointer;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div class="popup-one">Popup Element <button class="btn-one">×</button></div>

    <script src="master.js"></script>
  </body>
</html>
