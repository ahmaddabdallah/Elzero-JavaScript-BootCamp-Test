<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 5000px;
        }

        #btnTop {
            color: white;
            background-color: #333;
            padding: 12px;
            border-radius: 10px;
            transition: 0.5s ease all;
            border: none;
            position: fixed;
            bottom: 20px;
            right: 10px;
            font-size: 18px;
            display: none;
            cursor: pointer;
        }

        #btnTop:hover {
            background-color: red;
        }
    </style>
</head>

<body>
    <button id="btnTop">Button</button>
    <script src="pratice-scrollto.js"></script>
</body>

</html>
