<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100%;
      background-color: #efefee9f;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #btn-1 {
      padding: 50px 100px;
      background: none;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.5s ease;
      font-size: 30px;
      position: relative;
      border: none;
      color: #333;
      z-index: 1;
    }

    #btn-1::before {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      background: linear-gradient(90deg, #3498db, #e74c3c, #2ecc71, #f1c40f, #9b59b6, #1abc9c);
      background-size: 300% 300%;
      z-index: -1;
      border-radius: 7px;
      animation: animatedGradient 3s ease alternate infinite;
    }

    #btn-1::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: white;
      border-radius: 3px;
      z-index: -1;
    }

    @keyframes animatedGradient {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    #btn-1:hover {
      transform: scale(1.05);
    }

    #btn-1:active {
      transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <button id="btn-1">Click</button>
    <script src="083 - This Keyword.js"></script>
  </body>
</html>
