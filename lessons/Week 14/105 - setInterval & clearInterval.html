<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Timer</title>
    <style>
      body {
        background: #f5f7fa;
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      .count-down {
        background: #fff;
        color: #0078d7;
        font-size: 4rem;
        font-weight: bold;
        padding: 2rem 4rem;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        text-align: center;
        transition: background 0.3s, color 0.3s;
        animation: popIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        letter-spacing: 0.1em;
      }
      @keyframes popIn {
        0% {
          transform: scale(0.7);
          opacity: 0;
        }
        80% {
          transform: scale(1.1);
          opacity: 1;
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="count-down">5</div>
    <script src="105 - setInterval & clearInterval.js"></script>
  </body>
</html>
